<svg xmlns="http://www.w3.org/2000/svg" width="551" height="256" viewBox="0 0 551 256" fill="none" role="img" aria-label="Racha de contribuciones">
  <defs>
    <linearGradient id="tbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000080"/><stop offset="100%" stop-color="#1084d0"/>
    </linearGradient>
    <style>
      .num { font-family: Tahoma, Verdana, sans-serif; font-weight: bold; fill: #000080; }
      .lbl { font-family: Tahoma, Verdana, sans-serif; fill: #000000; }
      .dt  { font-family: Tahoma, Verdana, sans-serif; fill: #404040; }
      .ttl { font-family: Tahoma, Verdana, sans-serif; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect x="0" y="0" width="551" height="256" fill="#008080"/>

  <g transform="translate(28,28)">
  <!-- Ventana -->
  <rect x="8" y="8" width="479" height="184" fill="#c0c0c0"/>
  <path d="M8,192 L8,8 L487,8" stroke="#ffffff" stroke-width="2" fill="none"/>
  <path d="M8,192 L487,192 L487,8" stroke="#404040" stroke-width="2" fill="none"/>

  <!-- Barra de título -->
  <rect x="12" y="12" width="471" height="22" fill="url(#tbar)"/>
  <text class="ttl" x="20" y="28" font-size="13" letter-spacing="0.5">racha.exe</text>
  <rect x="464" y="14.5" width="16" height="16" fill="#c0c0c0" stroke="#404040" stroke-width="1"/>
  <path d="M467,18 L477,27 M477,18 L467,27" stroke="#000000" stroke-width="1.5"/>

  <!-- Divisores -->
  <line x1="167" y1="46" x2="167" y2="182" stroke="#808080" stroke-width="1"/>
     <line x1="168" y1="46" x2="168" y2="182" stroke="#ffffff" stroke-width="1"/>
  <line x1="327" y1="46" x2="327" y2="182" stroke="#808080" stroke-width="1"/>
     <line x1="328" y1="46" x2="328" y2="182" stroke="#ffffff" stroke-width="1"/>

  <!-- Columna 1: total -->
  <text class="num" x="88" y="100" font-size="34" text-anchor="middle">147</text>
  <text class="lbl" x="88" y="130" font-size="12" text-anchor="middle">Contribuciones</text>
  <text class="lbl" x="88" y="146" font-size="12" text-anchor="middle">totales</text>

  <!-- Columna 2: racha actual (destacada) -->
  <path d="M247,42 C256,51 253,60 247,61 C241,60 238,51 247,42 Z" fill="#FF3030"/>
     <path d="M247,49 C251,54 250,59 247,60 C244,59 243,54 247,49 Z" fill="#FFD23F"/>
  <circle cx="247" cy="92" r="30" fill="none" stroke="#000080" stroke-width="3"/>
  <text class="num" x="247" y="101" font-size="26" text-anchor="middle">0</text>
  <text class="lbl" x="247" y="142" font-size="12" font-weight="bold" text-anchor="middle">Racha actual</text>
  <text class="dt"  x="247" y="158" font-size="10" text-anchor="middle">—</text>

  <!-- Columna 3: racha más larga -->
  <text class="num" x="406" y="100" font-size="34" text-anchor="middle">10</text>
  <text class="lbl" x="406" y="130" font-size="12" text-anchor="middle">Racha más larga</text>
  <text class="dt"  x="406" y="148" font-size="10" text-anchor="middle">1 jul - 10 jul</text>
  </g>
</svg>
