<svg xmlns="http://www.w3.org/2000/svg" width="600" height="150" viewBox="0 0 600 150" fill="none" role="img" aria-label="MINERO DE PROMPTS">
  <defs>
    <linearGradient id="tbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000080"/>
      <stop offset="100%" stop-color="#1084d0"/>
    </linearGradient>

    <!-- Robotito retro gris metálico (centrado en su origen) -->
    <g id="bot">
      <line x1="0" y1="-15" x2="0" y2="-10" stroke="#404040" stroke-width="2"/>
      <circle cx="0" cy="-16" r="2.5" fill="#ff3030"/>
      <rect x="-9" y="-10" width="18" height="14" rx="2" fill="#c0c0c0" stroke="#404040" stroke-width="1.5"/>
      <rect x="-6" y="-7" width="12" height="5" fill="#000080"/>
      <circle cx="-3" cy="-4.5" r="1.4" fill="#00ffea"/>
      <circle cx="3"  cy="-4.5" r="1.4" fill="#00ffea"/>
      <rect x="-7" y="5" width="14" height="9" rx="1" fill="#a0a0a0" stroke="#404040" stroke-width="1.5"/>
    </g>

    <style>
      .bot { will-change: transform; }
      .a { animation: bA 9s linear infinite;  }
      .b { animation: bB 12s linear infinite; }
      .c { animation: bC 11s linear infinite; }
      .d { animation: bD 14s linear infinite; }

      @keyframes bA {
        0%{transform:translate(40px,28px)} 25%{transform:translate(560px,118px)}
        50%{transform:translate(110px,122px)} 75%{transform:translate(548px,26px)}
        100%{transform:translate(40px,28px)}
      }
      @keyframes bB {
        0%{transform:translate(560px,40px)} 30%{transform:translate(50px,120px)}
        60%{transform:translate(520px,124px)} 100%{transform:translate(560px,40px)}
      }
      @keyframes bC {
        0%{transform:translate(300px,124px)} 25%{transform:translate(36px,34px)}
        50%{transform:translate(564px,58px)} 75%{transform:translate(80px,120px)}
        100%{transform:translate(300px,124px)}
      }
      @keyframes bD {
        0%{transform:translate(36px,120px)} 30%{transform:translate(520px,30px)}
        65%{transform:translate(60px,30px)} 100%{transform:translate(36px,120px)}
      }
      .cursor { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }
    </style>
  </defs>

  <!-- Escritorio teal clásico -->
  <rect x="0" y="0" width="600" height="150" fill="#008080"/>

  <!-- Robots tipo salvapantallas, POR DETRÁS de la ventana -->
  <use class="bot a" href="#bot"/>
  <use class="bot b" href="#bot"/>
  <use class="bot c" href="#bot"/>
  <use class="bot d" href="#bot"/>

  <!-- Ventana estilo Windows 95 -->
  <g>
    <rect x="110" y="40" width="380" height="70" fill="#c0c0c0"/>
    <path d="M110,110 L110,40 L490,40" stroke="#ffffff" stroke-width="2" fill="none"/>
    <path d="M110,110 L490,110 L490,40" stroke="#404040" stroke-width="2" fill="none"/>

    <!-- Barra de título -->
    <rect x="113" y="43" width="374" height="20" fill="url(#tbar)"/>
    <text x="121" y="57" font-family="Tahoma, Verdana, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" letter-spacing="0.5">MINERO DE PROMPTS</text>

    <!-- Botón cerrar [X] -->
    <rect x="467" y="45.5" width="16" height="15" fill="#c0c0c0" stroke="#404040" stroke-width="1"/>
    <path d="M470,49 L480,57 M480,49 L470,57" stroke="#000000" stroke-width="1.5"/>

    <!-- Prompt -->
    <text x="123" y="92" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#000000">C:\PROMPTS&gt; mine</text>
    <rect class="cursor" x="261" y="82" width="8" height="13" fill="#000000"/>
  </g>
</svg>
